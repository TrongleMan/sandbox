<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayce's Craft Kits</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --rose: #e8567f;
    --rose-soft: #f9a8c0;
    --rose-pale: #fce4ec;
    --lavender: #b39ddb;
    --lavender-soft: #d1c4e9;
    --lavender-pale: #ede7f6;
    --mint: #81c784;
    --mint-soft: #a5d6a7;
    --mint-pale: #e8f5e9;
    --peach: #ffab91;
    --peach-soft: #ffccbc;
    --peach-pale: #fbe9e7;
    --sky: #81d4fa;
    --sky-soft: #b3e5fc;
    --sky-pale: #e1f5fe;
    --bg: #fef7f4;
    --bg-card: #ffffff;
    --bg-panel: #fff5f0;
    --border: #f0ddd6;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --text: #4a3728;
    --text-dim: #9c8578;
    --text-light: #c4a99e;
    --shadow-sm: 0 1px 3px rgba(74,55,40,0.06);
    --shadow-md: 0 4px 12px rgba(74,55,40,0.08);
    --shadow-lg: 0 8px 24px rgba(74,55,40,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-tag: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top Bar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--bg-panel), #fff0eb);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    gap: 12px;
    backdrop-filter: blur(8px);
    flex-wrap: wrap;
  }

  .topbar-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .topbar-title span { color: var(--rose); }

  .topbar-stats {
    display: flex;
    gap: 16px;
    color: var(--text-dim);
    font-size: 12px;
    align-items: center;
  }
  .topbar-stats .val { color: var(--rose); font-weight: 600; }

  /* ── Progress Bar ── */
  .progress-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px 8px;
    background: linear-gradient(135deg, var(--bg-panel), #fff0eb);
    font-size: 11px;
    color: var(--text-dim);
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--rose);
    border-radius: 3px;
    transition: width 0.6s ease;
    width: 0%;
  }
  .progress-label { white-space: nowrap; font-weight: 500; }

  /* ── Controls ── */
  .controls {
    position: relative;
    z-index: 10;
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    width: 220px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--rose-soft);
    box-shadow: 0 0 0 3px rgba(232,86,127,0.1);
  }
  .search-input::placeholder { color: var(--text-light); }

  .filter-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: capitalize;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    border-radius: var(--radius-tag);
    font-weight: 500;
  }
  .filter-btn:hover {
    border-color: var(--rose-soft);
    color: var(--rose);
    background: var(--rose-pale);
  }
  .filter-btn.active {
    border-color: var(--rose);
    color: white;
    background: var(--rose);
  }

  .filter-group {
    display: flex;
    gap: 4px;
    margin-left: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }

  .pick-btn {
    background: linear-gradient(135deg, var(--rose), #d44a6e);
    border: none;
    color: white;
    font-family: var(--font);
    font-size: 12px;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: var(--radius-tag);
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    margin-left: 8px;
    box-shadow: 0 2px 8px rgba(232,86,127,0.25);
  }
  .pick-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(232,86,127,0.35);
  }
  .pick-btn:active { transform: translateY(0); }

  .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  /* ── Seasonal Banner ── */
  .seasonal-banner {
    display: none;
    margin: 16px 20px 0;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--rose-pale), var(--lavender-pale));
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }
  .seasonal-banner.visible { display: block; }
  .seasonal-banner .seasonal-title {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .seasonal-banner .seasonal-kits {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .seasonal-kit-chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-tag);
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .seasonal-kit-chip:hover {
    border-color: var(--rose);
    color: var(--rose);
  }

  /* ── Main Content ── */
  .main {
    position: relative;
    z-index: 10;
    padding: 20px;
  }

  /* ── Grid View ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .card:hover .card-img { transform: scale(1.03); }

  .card-status-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .card-status-dot.s-unopened { background: var(--peach); }
  .card-status-dot.s-in-progress { background: var(--sky); }
  .card-status-dot.s-completed { background: var(--mint); }

  .card-body { padding: 12px 14px 14px; }

  .card-name {
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-line {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: var(--radius-tag);
    font-weight: 500;
    border: none;
  }

  .tag-craft { background: var(--mint-pale); color: #2e7d32; }
  .tag-brand { background: var(--lavender-pale); color: #5e35b1; }
  .tag-type { background: var(--peach-pale); color: #d84315; }
  .tag-theme { background: #fff8e1; color: #f57f17; }
  .tag-effort-quick { background: var(--sky-pale); color: #0277bd; }
  .tag-effort-evening { background: var(--peach-pale); color: #bf360c; }
  .tag-effort-multi-session { background: var(--lavender-pale); color: #4527a0; }

  .card-status-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: var(--radius-tag);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: capitalize;
    border: none;
    font-family: var(--font);
    line-height: 1.4;
  }
  .card-status-pill:hover { filter: brightness(0.92); }
  .card-status-pill.s-unopened { background: var(--peach-pale); color: #d84315; }
  .card-status-pill.s-in-progress { background: var(--sky-pale); color: #0277bd; }
  .card-status-pill.s-completed { background: var(--mint-pale); color: #2e7d32; }

  @keyframes highlight-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(232,86,127,0.5); }
    50%  { box-shadow: 0 0 0 10px rgba(232,86,127,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,86,127,0); }
  }
  .card.highlighted {
    animation: highlight-pulse 0.8s ease-in-out 3;
    border-color: var(--rose);
    z-index: 5;
  }

  /* ── Suggestion Card ── */
  .suggestion-card {
    background: linear-gradient(135deg, var(--lavender-pale), var(--mint-pale));
    border: 1px dashed var(--lavender-soft);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
    min-height: 200px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .suggestion-card:hover {
    border-color: var(--lavender);
    transform: translateY(-2px);
  }
  .suggestion-card .suggestion-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .suggestion-card .suggestion-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .suggestion-card .suggestion-craft {
    font-size: 12px;
    color: var(--lavender);
    font-weight: 500;
  }

  /* ── List View ── */
  .list { display: none; }
  .list.active { display: block; }
  .grid.active { display: grid; }

  .list-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .list-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    background: var(--bg-card);
    position: sticky;
    top: 42px;
    z-index: 5;
    font-weight: 600;
  }

  .list-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .list-table tr:hover td { background: var(--rose-pale); }
  .list-table .col-name { color: var(--text); font-weight: 600; }
  .list-table .col-craft { color: #2e7d32; }
  .list-table .col-brand { color: #5e35b1; }

  .list-thumb {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(74,55,40,0.6);
    backdrop-filter: blur(8px);
    justify-content: center;
    align-items: center;
    padding: 40px;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    display: flex;
    gap: 0;
    max-width: 950px;
    max-height: 85vh;
    width: 100%;
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .lightbox-photos {
    display: flex;
    flex-direction: column;
    max-width: 400px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .lightbox-photos .lb-photo-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    font-weight: 600;
    padding: 8px 12px 4px;
    text-align: center;
  }
  .lightbox-img {
    max-width: 400px;
    max-height: 38vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }
  .lightbox-img.single { max-height: 80vh; }

  .lightbox-details {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    padding: 24px;
  }

  .lightbox-name {
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
  }

  .lightbox-meta {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 2;
  }
  .lightbox-meta .label {
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    font-weight: 600;
  }
  .lightbox-meta .value { color: var(--text); }

  .lb-status-controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .lb-status-btn {
    font-family: var(--font);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: var(--radius-tag);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: capitalize;
    border: 2px solid transparent;
    background: var(--bg);
    color: var(--text-dim);
  }
  .lb-status-btn:hover { border-color: var(--rose-soft); }
  .lb-status-btn.s-unopened.active-status { background: var(--peach-pale); color: #d84315; border-color: var(--peach); }
  .lb-status-btn.s-in-progress.active-status { background: var(--sky-pale); color: #0277bd; border-color: var(--sky); }
  .lb-status-btn.s-completed.active-status { background: var(--mint-pale); color: #2e7d32; border-color: var(--mint); }

  .lb-notes {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .lb-notes:focus { border-color: var(--rose-soft); }
  .lb-notes::placeholder { color: var(--text-light); }

  .lb-tutorial-link {
    display: inline-block;
    background: var(--lavender-pale);
    color: #5e35b1;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: var(--radius-tag);
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid var(--lavender-soft);
  }
  .lb-tutorial-link:hover { background: var(--lavender-soft); border-color: var(--lavender); }

  .lb-dates { font-size: 11px; color: var(--text-light); line-height: 1.8; }

  .lightbox-close {
    position: fixed;
    top: 16px;
    right: 20px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    background: rgba(74,55,40,0.5);
    border: none;
    font-family: var(--font);
    z-index: 10001;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .lightbox-close:hover { background: var(--rose); }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .lightbox-inner { flex-direction: column; border-radius: var(--radius-sm); }
    .lightbox-photos { max-width: 100%; }
    .lightbox-img { max-width: 100%; }
    .lightbox-details { padding: 16px; }
    .controls { flex-direction: column; align-items: stretch; }
    .search-input { width: 100%; }
    .filter-group { margin-left: 0; padding-left: 0; border-left: none; }
    .view-toggle { margin-left: 0; }
    .pick-btn { margin-left: 0; width: 100%; }
    .topbar { flex-direction: column; align-items: flex-start; }
    .topbar-stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Kayce's <span>Craft Kits</span></div>
  <div class="topbar-stats">
    <span><span class="val" id="count-total">26</span> kits</span>
    <span><span class="val" id="count-brands">2</span> brands</span>
    <span><span class="val" id="count-crafts">5</span> crafts</span>
    <span><span class="val" id="count-completed">0</span> completed</span>
  </div>
</div>

<div class="progress-wrap">
  <span class="progress-label" id="progress-label">0 of 26 completed</span>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div class="controls">
  <input type="text" class="search-input" id="search" placeholder="search kits...">

  <div class="filter-group" id="craft-filters">
    <button class="filter-btn active" data-filter="all">All</button>
  </div>

  <div class="filter-group" id="brand-filters">
    <button class="filter-btn active" data-brand="all">All Brands</button>
  </div>

  <div class="filter-group" id="status-filters">
    <button class="filter-btn active" data-status="all">All Status</button>
    <button class="filter-btn" data-status="unopened">Unopened</button>
    <button class="filter-btn" data-status="in-progress">In Progress</button>
    <button class="filter-btn" data-status="completed">Completed</button>
  </div>

  <div class="filter-group" id="effort-filters">
    <button class="filter-btn active" data-effort="all">All Effort</button>
    <button class="filter-btn" data-effort="quick">Quick</button>
    <button class="filter-btn" data-effort="evening">Evening</button>
    <button class="filter-btn" data-effort="multi-session">Multi-session</button>
  </div>

  <button class="pick-btn" id="pick-btn">Pick for me</button>

  <div class="view-toggle">
    <button class="filter-btn active" id="btn-grid">grid</button>
    <button class="filter-btn" id="btn-list">list</button>
  </div>
</div>

<div class="seasonal-banner" id="seasonal-banner">
  <div class="seasonal-title" id="seasonal-title"></div>
  <div id="seasonal-text"></div>
  <div class="seasonal-kits" id="seasonal-kits"></div>
</div>

<div class="main">
  <div class="grid active" id="grid-view"></div>
  <div class="list" id="list-view">
    <table class="list-table">
      <thead>
        <tr>
          <th></th>
          <th>Name</th>
          <th>Brand</th>
          <th>Line</th>
          <th>Craft</th>
          <th>Effort</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>
  <div class="empty-state" id="empty" style="display:none;">No kits match your filters.</div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">&times;</button>
  <div class="lightbox-inner">
    <div class="lightbox-photos" id="lb-photos">
      <img class="lightbox-img single" id="lb-img" src="" alt="">
    </div>
    <div class="lightbox-details">
      <div class="lightbox-name" id="lb-name"></div>
      <div class="lightbox-meta" id="lb-meta"></div>
      <div class="card-tags" id="lb-tags"></div>

      <div>
        <div class="label" style="color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;font-size:10px;font-weight:600;margin-bottom:6px;">Status</div>
        <div class="lb-status-controls" id="lb-status-controls">
          <button class="lb-status-btn s-unopened" data-status="unopened">Unopened</button>
          <button class="lb-status-btn s-in-progress" data-status="in-progress">In Progress</button>
          <button class="lb-status-btn s-completed" data-status="completed">Completed</button>
        </div>
      </div>

      <div class="lb-dates" id="lb-dates"></div>

      <div id="lb-tutorial-wrap" style="display:none;">
        <a class="lb-tutorial-link" id="lb-tutorial" href="#" target="_blank" rel="noopener">View Tutorial</a>
      </div>

      <div>
        <div class="label" style="color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;font-size:10px;font-weight:600;margin-bottom:6px;">Notes</div>
        <textarea class="lb-notes" id="lb-notes" placeholder="Add notes about this kit..."></textarea>
      </div>
    </div>
  </div>
</div>

<script>

// ── Helpers ──
function kitId(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}
function defaultKitData() {
  return { status: 'unopened', startedAt: null, completedAt: null, notes: '', completedPhoto: null, tutorialUrl: null };
}
function effortLabel(e) {
  if (!e) return '';
  if (e === 'multi-session') return 'Multi-session';
  return e.charAt(0).toUpperCase() + e.slice(1);
}

// ── Persistence via localStorage ──
const STORAGE_KEY = 'craft-kit-data';

let kitData = {};

function loadData() {
  // Seed defaults for all kits
  KITS.forEach(k => { kitData[kitId(k.name)] = defaultKitData(); });
  // Overlay saved state from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.keys(saved).forEach(id => {
      if (kitData[id]) Object.assign(kitData[id], saved[id]);
    });
  } catch { /* first visit or corrupted state, start fresh */ }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(kitData)); } catch { /* storage full or private mode */ }
}

function getKitData(kit) {
  return kitData[kitId(kit.name)] || defaultKitData();
}

function saveKitField(kit, fields) {
  const id = kitId(kit.name);
  if (!kitData[id]) kitData[id] = defaultKitData();
  Object.assign(kitData[id], fields);
  saveData();
}

// ── Filters ──
let currentFilter = 'all';
let currentBrand = 'all';
let currentStatus = 'all';
let currentEffort = 'all';
let currentSearch = '';

const crafts = [...new Set(KITS.map(k => k.craft).filter(Boolean))].sort();
const craftFilters = document.getElementById('craft-filters');
crafts.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = c;
  btn.textContent = c;
  craftFilters.appendChild(btn);
});

const brands = [...new Set(KITS.map(k => k.brand))].sort();
const brandFilters = document.getElementById('brand-filters');
brands.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.brand = b;
  btn.textContent = b;
  brandFilters.appendChild(btn);
});

function getFiltered() {
  return KITS.filter(k => {
    if (currentFilter !== 'all' && k.craft !== currentFilter) return false;
    if (currentBrand !== 'all' && k.brand !== currentBrand) return false;
    if (currentStatus !== 'all' && getKitData(k).status !== currentStatus) return false;
    if (currentEffort !== 'all' && k.effort !== currentEffort) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      const hay = [k.name, k.brand, k.line, k.craft, k.theme, k.type, k.size, k.effort]
        .filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ── Rendering ──
function renderGrid(items) {
  const grid = document.getElementById('grid-view');
  let html = items.map(k => {
    const d = getKitData(k);
    const sc = `s-${d.status}`;
    const effortTag = k.effort ? `<span class="tag tag-effort-${k.effort}">${effortLabel(k.effort)}</span>` : '';
    return `
    <div class="card" data-idx="${KITS.indexOf(k)}">
      <div class="card-img-wrap">
        <img class="card-img" src="photos/${k.photo}" alt="${k.name}" loading="lazy">
        <div class="card-status-dot ${sc}"></div>
      </div>
      <div class="card-body">
        <div class="card-name">${k.name}</div>
        <div class="card-line">${k.line}</div>
        <div class="card-tags">
          ${k.craft ? `<span class="tag tag-craft">${k.craft}</span>` : ''}
          <span class="tag tag-brand">${k.brand}</span>
          ${k.type ? `<span class="tag tag-type">${k.type}</span>` : ''}
          ${k.theme ? `<span class="tag tag-theme">${k.theme}</span>` : ''}
          ${effortTag}
          <button class="card-status-pill ${sc}" data-kit-idx="${KITS.indexOf(k)}" onclick="event.stopPropagation();cycleStatus(${KITS.indexOf(k)})">${d.status.replace('-', ' ')}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const suggestion = getSuggestion();
  if (suggestion) {
    html += `
    <div class="suggestion-card" data-idx="${KITS.indexOf(suggestion)}">
      <div class="suggestion-label">Try something new</div>
      <div class="suggestion-name">${suggestion.name}</div>
      <div class="suggestion-craft">${suggestion.craft}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

function renderList(items) {
  document.getElementById('list-body').innerHTML = items.map(k => {
    const d = getKitData(k);
    return `
    <tr class="list-row" data-idx="${KITS.indexOf(k)}">
      <td><img class="list-thumb" src="photos/${k.photo}" alt="${k.name}" loading="lazy"></td>
      <td class="col-name">${k.name}</td>
      <td class="col-brand">${k.brand}</td>
      <td>${k.line}</td>
      <td class="col-craft">${k.craft || ''}</td>
      <td>${effortLabel(k.effort)}</td>
      <td><span class="card-status-pill s-${d.status}" style="cursor:default;">${d.status.replace('-', ' ')}</span></td>
    </tr>`;
  }).join('');
}

function updateProgress() {
  const completed = KITS.filter(k => getKitData(k).status === 'completed').length;
  const total = KITS.length;
  document.getElementById('progress-label').textContent = `${completed} of ${total} completed`;
  document.getElementById('progress-fill').style.width = `${(completed / total) * 100}%`;
  document.getElementById('count-completed').textContent = completed;
}

function render() {
  const items = getFiltered();
  renderGrid(items);
  renderList(items);
  document.getElementById('count-total').textContent = items.length;
  document.getElementById('empty').style.display = items.length ? 'none' : 'block';
  updateProgress();
  renderSeasonalBanner();
}

// ── Status Cycling ──
function cycleStatus(idx) {
  const kit = KITS[idx];
  const d = getKitData(kit);
  const order = ['unopened', 'in-progress', 'completed'];
  const next = order[(order.indexOf(d.status) + 1) % 3];
  const now = new Date().toISOString().slice(0, 10);
  const updates = { status: next };
  if (next === 'in-progress' && !d.startedAt) updates.startedAt = now;
  if (next === 'completed') updates.completedAt = now;
  if (next === 'unopened') { updates.startedAt = null; updates.completedAt = null; }
  saveKitField(kit, updates);
  render();
  if (lb.classList.contains('open') && currentLightboxIdx === idx) openLightbox(idx);
}

// ── Seasonal Banner ──
const SEASON_MAP = {
  'christmas': { months: [11, 12], message: 'Holiday crafting season! These kits are perfect right now.' },
  'autumn/halloween': { months: [9, 10], message: 'Get in the autumn spirit with these seasonal kits.' },
  'valentine/floral': { months: [2], message: "Valentine's Day crafting! Make something heartfelt." },
  'winter/floral': { months: [12, 1, 2], message: 'Cozy up with these winter crafts.' },
  'nature/summer': { months: [6, 7, 8], message: 'Perfect for summer crafting sessions.' },
};

function renderSeasonalBanner() {
  const month = new Date().getMonth() + 1;
  const banner = document.getElementById('seasonal-banner');
  const seasonalKits = [];
  let message = '';
  KITS.forEach(k => {
    if (!k.theme || getKitData(k).status !== 'unopened') return;
    const season = SEASON_MAP[k.theme];
    if (season && season.months.includes(month)) {
      seasonalKits.push(k);
      if (!message) message = season.message;
    }
  });
  if (!seasonalKits.length) { banner.classList.remove('visible'); return; }
  document.getElementById('seasonal-title').textContent = 'In Season';
  document.getElementById('seasonal-text').textContent = message;
  document.getElementById('seasonal-kits').innerHTML = seasonalKits.map(k =>
    `<span class="seasonal-kit-chip" data-idx="${KITS.indexOf(k)}">${k.name}</span>`
  ).join('');
  banner.classList.add('visible');
}

document.getElementById('seasonal-kits').addEventListener('click', e => {
  const chip = e.target.closest('.seasonal-kit-chip');
  if (chip) openLightbox(parseInt(chip.dataset.idx));
});

// ── "Try Something New" ──
function getSuggestion() {
  if (currentFilter === 'all') return null;
  const hasCompleted = KITS.some(k => k.craft === currentFilter && getKitData(k).status === 'completed');
  if (!hasCompleted) return null;
  const completedCrafts = new Set(KITS.filter(k => k.craft && getKitData(k).status === 'completed').map(k => k.craft));
  const candidates = KITS.filter(k => k.craft && !completedCrafts.has(k.craft) && getKitData(k).status === 'unopened');
  return candidates.length ? candidates[Math.floor(Math.random() * candidates.length)] : null;
}

// ── "Pick for me" ──
document.getElementById('pick-btn').addEventListener('click', () => {
  const candidates = getFiltered().filter(k => getKitData(k).status === 'unopened');
  if (!candidates.length) return;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  const idx = KITS.indexOf(pick);
  document.querySelectorAll('.card.highlighted').forEach(c => c.classList.remove('highlighted'));
  document.getElementById('grid-view').classList.add('active');
  document.getElementById('list-view').classList.remove('active');
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => card.classList.add('highlighted'), 300);
    setTimeout(() => card.classList.remove('highlighted'), 3000);
  }
});

  render();

document.getElementById('status-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.getElementById('status-filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = btn.dataset.status;
  render();

document.getElementById('effort-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.getElementById('effort-filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentEffort = btn.dataset.effort;
  render();
});
document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; render(); });

document.getElementById('btn-grid').addEventListener('click', () => {
  document.getElementById('grid-view').classList.add('active');
  document.getElementById('list-view').classList.remove('active');
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
});
document.getElementById('btn-list').addEventListener('click', () => {
  document.getElementById('grid-view').classList.remove('active');
  document.getElementById('list-view').classList.add('active');
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
});

// ── Lightbox ──
const lb = document.getElementById('lightbox');
let currentLightboxIdx = null;

function openLightbox(idx) {
  const k = KITS[idx];
  const d = getKitData(k);
  currentLightboxIdx = idx;

  const photosEl = document.getElementById('lb-photos');
  if (d.completedPhoto) {
    photosEl.innerHTML = `
      <div class="lb-photo-label">Kit</div>
      <img class="lightbox-img" src="photos/${k.photo}" alt="${k.name}">
      <div class="lb-photo-label">Completed</div>
      <img class="lightbox-img" src="photos/${d.completedPhoto}" alt="${k.name} completed">
    `;
  } else {
    photosEl.innerHTML = `<img class="lightbox-img single" src="photos/${k.photo}" alt="${k.name}">`;
  }

  document.getElementById('lb-name').textContent = k.name;
  document.getElementById('lb-meta').innerHTML = [
    { label: 'Brand', value: k.brand },
    { label: 'Line', value: k.line },
    { label: 'Craft', value: k.craft || 'n/a' },
    { label: 'Theme', value: k.theme || 'n/a' },
    { label: 'Size', value: k.size || 'n/a' },
    { label: 'Type', value: k.type || 'kit' },
    { label: 'Effort', value: effortLabel(k.effort) || 'n/a' },
  ].map(m => `<div><span class="label">${m.label}:</span> <span class="value">${m.value}</span></div>`).join('');

  const tags = [];
  if (k.craft) tags.push(`<span class="tag tag-craft">${k.craft}</span>`);
  tags.push(`<span class="tag tag-brand">${k.brand}</span>`);
  if (k.type) tags.push(`<span class="tag tag-type">${k.type}</span>`);
  if (k.theme) tags.push(`<span class="tag tag-theme">${k.theme}</span>`);
  if (k.effort) tags.push(`<span class="tag tag-effort-${k.effort}">${effortLabel(k.effort)}</span>`);
  document.getElementById('lb-tags').innerHTML = tags.join('');

  document.querySelectorAll('.lb-status-btn').forEach(btn => {
    btn.classList.toggle('active-status', btn.dataset.status === d.status);
  });

  const dateLines = [];
  if (d.startedAt) dateLines.push(`Started: ${d.startedAt}`);
  if (d.completedAt) dateLines.push(`Completed: ${d.completedAt}`);
  document.getElementById('lb-dates').innerHTML = dateLines.join('<br>');

  const tutWrap = document.getElementById('lb-tutorial-wrap');
  if (d.tutorialUrl) { document.getElementById('lb-tutorial').href = d.tutorialUrl; tutWrap.style.display = ''; }
  else { tutWrap.style.display = 'none'; }

  document.getElementById('lb-notes').value = d.notes || '';
  lb.classList.add('open');
}

document.getElementById('lb-status-controls').addEventListener('click', e => {
  const btn = e.target.closest('.lb-status-btn');
  if (!btn || currentLightboxIdx === null) return;
  const newStatus = btn.dataset.status;
  const kit = KITS[currentLightboxIdx];
  const d = getKitData(kit);
  const now = new Date().toISOString().slice(0, 10);
  const updates = { status: newStatus };
  if (newStatus === 'in-progress' && !d.startedAt) updates.startedAt = now;
  if (newStatus === 'completed') updates.completedAt = now;
  if (newStatus === 'unopened') { updates.startedAt = null; updates.completedAt = null; }
  saveKitField(kit, updates);
  openLightbox(currentLightboxIdx);
  render();
});

document.getElementById('lb-notes').addEventListener('blur', e => {
  if (currentLightboxIdx === null) return;
  saveKitField(KITS[currentLightboxIdx], { notes: e.target.value });
});

document.addEventListener('click', e => {
  const card = e.target.closest('.card, .list-row, .suggestion-card');
  if (card && card.dataset.idx !== undefined) openLightbox(parseInt(card.dataset.idx));
});

document.getElementById('lb-close').addEventListener('click', () => { lb.classList.remove('open'); currentLightboxIdx = null; });
lb.addEventListener('click', e => { if (e.target === lb) { lb.classList.remove('open'); currentLightboxIdx = null; } });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { lb.classList.remove('open'); currentLightboxIdx = null; } });

// ── Init ──
loadData();
render();
</script>
